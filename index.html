<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <title>Routine & Alarm Manager</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent-color: #6366f1;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      padding: 20px;
      min-height: 100vh;
    }

    .app-container {
      width: 100%;
      max-width: 600px;
    }

    header {
      text-align: center;
      margin-bottom: 24px;
    }

    header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .clock {
      font-size: 2.5rem;
      font-weight: bold;
      color: var(--accent-color);
      background: var(--card-bg);
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      display: inline-block;
      margin-top: 10px;
    }

    /* Tabs Layout */
    .tabs {
      display: flex;
      margin-bottom: 20px;
      background: var(--card-bg);
      border-radius: 8px;
      padding: 4px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.3s ease;
    }

    .tab-btn.active {
      background: var(--accent-color);
      color: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Form Styles */
    .input-card {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid var(--border-color);
    }

    .form-group {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    input, select, button {
      padding: 10px 14px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      background: #0f172a;
      color: var(--text-color);
      font-size: 1rem;
    }

    input[type="text"] {
      flex: 1;
    }

    .btn-action {
      background: var(--accent-color);
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-action:hover {
      opacity: 0.9;
    }

    /* Item Cards List */
    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item-card {
      background: var(--card-bg);
      padding: 16px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border-color);
    }

    .item-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .item-title {
      font-weight: bold;
    }

    .item-title.completed {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .item-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .btn-delete {
      background: #ef4444;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      padding: 6px 10px;
    }

    /* Modal Banner for Triggered Alarm */
    .alarm-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .alarm-banner h2 {
      font-size: 2.5rem;
      color: #ef4444;
      margin-bottom: 12px;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }
  </style>
  <link rel="manifest" href="manifest.json">
    <script>
    if ('serviceWorker' in navigator) {
     navigator.serviceWorker.register('sw.js');
    }
    </script>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>Routine & Alarm Hub</h1>
      <div class="clock" id="live-clock">00:00:00 AM</div>
    </header>

    <!-- Navigation Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('routine')">Daily Routine</button>
      <button class="tab-btn" onclick="switchTab('alarms')">Alarms</button>
    </div>

    <!-- Routine Section -->
    <div id="routine-tab" class="tab-content active">
      <div class="input-card">
        <h3>Add Routine Task</h3>
        <div class="form-group">
          <input type="text" id="routine-title" placeholder="e.g. Exercise, Read 10 pages..." />
          <input type="time" id="routine-time" />
          <button class="btn-action" onclick="addRoutine()">Add</button>
        </div>
      </div>
      <div class="list" id="routine-list"></div>
    </div>

    <!-- Alarm Section -->
    <div id="alarms-tab" class="tab-content">
      <div class="input-card">
        <h3>Set New Alarm</h3>
        <div class="form-group">
          <input type="text" id="alarm-label" placeholder="Alarm Label (e.g., Wake Up)" />
          <input type="time" id="alarm-time" />
          <button class="btn-action" onclick="addAlarm()">Set Alarm</button>
        </div>
      </div>
      <div class="list" id="alarm-list"></div>
    </div>
  </div>

  <!-- Triggered Alarm Overlay -->
  <div class="alarm-banner" id="alarm-banner">
    <h2 id="alarm-banner-title">ALARM RINGING!</h2>
    <p style="margin-bottom: 20px; font-size: 1.2rem;" id="alarm-banner-label">Task Time!</p>
    <button class="btn-action" style="padding: 14px 28px; font-size: 1.2rem;" onclick="stopAlarm()">Dismiss Alarm</button>
  </div>

  <script>
    // State management backed by localStorage
    let routines = JSON.parse(localStorage.getItem('routines')) || [];
    let alarms = JSON.parse(localStorage.getItem('alarms')) || [];
    
    let audioCtx = null;
    let alarmInterval = null;
    let activeRingingAlarm = null;

    // Load UI on launch
    renderRoutines();
    renderAlarms();

    // Digital Clock Updates & Continuous Alarm Checking
    setInterval(() => {
      const now = new Date();
      const timeString = now.toLocaleTimeString();
      document.getElementById('live-clock').innerText = timeString;

      // Current HH:MM matching format
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = now.getSeconds();
      const currentTimeFormatted = `${hours}:${minutes}`;

      // Check alarms at the start of every minute (seconds === 0)
      if (seconds === 0) {
        alarms.forEach(alarm => {
          if (alarm.enabled && alarm.time === currentTimeFormatted) {
            triggerAlarm(alarm);
          }
        });
      }
    }, 1000);

    // Tab Switcher
    function switchTab(tabName) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

      if (tabName === 'routine') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('routine-tab').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('alarms-tab').classList.add('active');
      }
    }

    // --- Routine Methods ---
    function addRoutine() {
      const title = document.getElementById('routine-title').value.trim();
      const time = document.getElementById('routine-time').value;

      if (!title) return alert('Please enter a routine task name.');

      routines.push({ id: Date.now(), title, time, completed: false });
      saveAndRender();
      document.getElementById('routine-title').value = '';
    }

    function toggleRoutine(id) {
      routines = routines.map(item => item.id === id ? { ...item, completed: !item.completed } : item);
      saveAndRender();
    }

    function deleteRoutine(id) {
      routines = routines.filter(item => item.id !== id);
      saveAndRender();
    }

    function renderRoutines() {
      const container = document.getElementById('routine-list');
      container.innerHTML = routines.map(item => `
        <div class="item-card">
          <div class="item-info">
            <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleRoutine(${item.id})" style="transform: scale(1.3); cursor:pointer;">
            <div>
              <div class="item-title ${item.completed ? 'completed' : ''}">${item.title}</div>
              <div class="item-sub">${item.time ? 'Scheduled: ' + item.time : 'Anytime daily'}</div>
            </div>
          </div>
          <button class="btn-delete" onclick="deleteRoutine(${item.id})">Delete</button>
        </div>
      `).join('');
    }

    // --- Alarm Methods ---
    function addAlarm() {
      const label = document.getElementById('alarm-label').value.trim() || 'Alarm';
      const time = document.getElementById('alarm-time').value;

      if (!time) return alert('Please choose a valid time for your alarm.');

      alarms.push({ id: Date.now(), label, time, enabled: true });
      saveAndRender();
      document.getElementById('alarm-label').value = '';
    }

    function toggleAlarm(id) {
      alarms = alarms.map(a => a.id === id ? { ...a, enabled: !a.enabled } : a);
      saveAndRender();
    }

    function deleteAlarm(id) {
      alarms = alarms.filter(a => a.id !== id);
      saveAndRender();
    }

    function renderAlarms() {
      const container = document.getElementById('alarm-list');
      container.innerHTML = alarms.map(alarm => `
        <div class="item-card">
          <div>
            <div class="item-title" style="font-size: 1.4rem;">${alarm.time}</div>
            <div class="item-sub">${alarm.label}</div>
          </div>
          <div style="display:flex; gap:10px; align-items:center;">
            <input type="checkbox" ${alarm.enabled ? 'checked' : ''} onchange="toggleAlarm(${alarm.id})" style="transform: scale(1.3); cursor:pointer;">
            <button class="btn-delete" onclick="deleteAlarm(${alarm.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function saveAndRender() {
      localStorage.setItem('routines', JSON.stringify(routines));
      localStorage.setItem('alarms', JSON.stringify(alarms));
      renderRoutines();
      renderAlarms();
    }

    // --- Sound & Alarm Sound Engine ---
    function playBeepSound() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Pitch (A5 note)
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.4); // Beep duration 0.4 sec
    }

    function triggerAlarm(alarm) {
      activeRingingAlarm = alarm;
      document.getElementById('alarm-banner-label').innerText = alarm.label;
      document.getElementById('alarm-banner').style.display = 'flex';

      // Repeat beep sound every 800ms
      playBeepSound();
      alarmInterval = setInterval(playBeepSound, 800);
    }

    function stopAlarm() {
      if (alarmInterval) clearInterval(alarmInterval);
      document.getElementById('alarm-banner').style.display = 'none';
      activeRingingAlarm = null;
    }
  </script>
</body>
</html>
